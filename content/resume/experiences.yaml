items:
  -
    id: "oisix"
    employmentType: "contract"
    period: "2025.09 - 2026.03"
    duration: "7ヶ月"
    bizType: "BtoC"
    companyName: "オイシックス・ラ・大地株式会社"
    projectName: "Oisix ECアプリ開発"
    role: "Androidアプリの機能開発・保守・技術基盤改善"
    team: "約10名"
    collaboration: "iOSチーム"
    techStack:
      - "Kotlin"
      - "Kotlin Coroutines"
      - "Kotlin Flow"
      - "Jetpack Compose"
      - "Android"
      - "KMP (Kotlin Multiplatform)"
      - "Swift (iOS連携)"
      - "Ktor (Mock Server構築)"
      - "Claude Code"
      - "Devin"
      - "GitHub Actions"
      - "Roborazzi (Screenshot Testing)"
      - "ADR (Architecture Decision Records)"
    overview:
      -
        text: "会員数360万人超のEC定期便サービス「Oisix」のAndroid/iOSアプリ開発に従事。"
      -
        text: "Android版ストアはこちら"
        links:
          -
            label: "Android版ストア"
            url: "https://play.google.com/store/apps/details?id=com.oisix.oisixAndroid&hl=ja"
      -
        text: "30以上のマルチモジュール構成で、KMP (Kotlin Multiplatform) によるiOSとのコード共有を推進中。"
      -
        text: "アーキテクチャはClean Architecture + DDDに基づき、UseCase層を中心としたドメインロジックの設計。"
    responsibility:
      -
        text: "Androidアプリの機能開発・保守、および技術基盤改善を担当。"
      -
        text: "チーム人数は約10名（Android専任）、iOSチームとの連携あり。"
    challenges:
      -
        text: "Claude等AI導入によって実装までは早くなったものの、レビューが最大のボトルネックになっている。"
      -
        text: "クリティカル導線テストを実施する際に曜日に依存する仕様やテストの前提条件となるアカウントの用意が困難な箇所があり、テストの実施が困難となっている。"
      -
        text: "KMPによって提供しているUseCaseが十分に検証されておらず、iOS側で使用された際にクラッシュする問題を引き起こすなど種々の問題を引き起こしていた。"
      -
        text: "GitHub Copilotコードレビューが導入されているが、copilot-instructions.mdの内容が適切ではないため、ハルシネーション頻度が高く、レビュイー・レビュワー双方が対応しなければならない指摘まで無視してしまう頻度が増えていた。"
        links:
          -
            label: "GitHub Copilotコードレビュー"
            url: "https://docs.github.com/ja/copilot/how-tos/use-copilot-agents/request-a-code-review/use-code-review"
      -
        text: "oss-licenses-pluginが使用されているが、EdgeToEdgeに対応できず、アップデートされる度に無視できない頻度でライセンス情報が表示出来なくなるなど品質に問題を抱えており、対応される速度が非常に遅い。"
        links:
          -
            label: "oss-licenses-plugin"
            url: "https://github.com/google/play-services-plugins/tree/main/oss-licenses-plugin"
      -
        text: "SwiftExportの導入を検討しているが、誰も手が空いておらず導入検討を行うことができていない。"
        links:
          -
            label: "SwiftExport"
            url: "https://kotlinlang.org/docs/native-swift-export.html"
      -
        text: "Devinがチームで使用可能になったが、誰も手が空いておらず初期設定やどのように運用していくかを検討できていない。"
        links:
          -
            label: "Devin"
            url: "https://devin.ai/"
      -
        text: "レガシーな「HostService」パターンがテスタビリティとKMP移行の障壁となっていた。RxJavaベースの実装が多く、Coroutine移行が進んでいない。iOS側との共通化を阻む設計上の問題。"
      -
        text: "アーキテクチャ決定の経緯が暗黙知化しており、新規メンバーのキャッチアップに時間がかかる。"
    approach:
      -
        title: "PRのレビューを半自動化する大規模なClaudeスキルの作成"
        body:
          text: "ベースブランチと対象ブランチとの差分をClaudeが検出し、テストプランを組み立てadbコマンドなどを使用してClaudeが自律的に動作確認を行う。一時的なログコードの挿入、スクリーンショット、画面の録画を行うことでエビデンスを収集し動作確認後に該当PRにレポートを投稿する。Claudeの推論に任せる箇所と、シェルによってべき等性を担保する箇所とを分け、スキル発動のたびにべき等性が担保されず結果や出力形式がバラバラになる問題を解決。テスト可能な箇所とテスト不能な箇所とをClaude自身がシェルを使用して判別可能となっており、テストが実施できない場合は改善Issueを投稿する機能も用意しスケール可能としている。現状はADBコマンド等に依存しているためAndroid専用だが、idbやsimctlなどのコマンドを使用することでiOS版も作成可能。"
      -
        title: "Ktorを用いたMockServerの構築"
        body:
          text: "ClaudeなどのAIエージェントが使用することを前提としたシナリオ・Fixture切り替えをコマンドによって実行可能なMockServerを構築した。このMockServerを使用することで曜日・時間に関係なく任意のシナリオや条件でテストを実行できるようになり、曜日依存や一部前提を整えることが難しいテストを容易に実行可能としテスト効率が向上。単なるスタブではなくステートフルモックとして設計し、BEの送料・冷凍手数料計算ロジックをSTG実測値ベースで簡略化再現することで、商品追加・削除・数量変更に連動した金額再計算をBE依存なしで動作確認可能とした。エンドポイント追加時にフィクスチャ未実装やドキュメント未登録をコンパイル時・起動時・CI時の3段階で検出する型安全な設計とし、チームでの継続開発における品質を構造的に担保した。Claudeを使用することで高速に要件定義から実装・動作確認までを完遂。"
      -
        title: "KMP対応の基盤整備"
        body:
          text: "@ObjCName、@Throws アノテーションの付与漏れ、fun interface以外の実装違反を検出するシェルを作成し、GitHubActionsでPR作成時に毎回チェックするようにした。ObjCNameアノテーションを必須とすることでiOS側との連携時の名前マングリング問題を防止した。Throwsアノテーションを必須とすることでiOS側でExceptionをキャッチできずにクラッシュする箇所が混入する問題を防止した。単一責任原則をコードで強制しファイルによって記述がバラバラとなり種々の問題を引き起こす可能性を防止。"
          links:
            -
              label: "@ObjCName"
              url: "https://kotlinlang.org/docs/native-objc-interop.html#change-declaration-names"
            -
              label: "@Throws アノテーションの付与漏れ"
              url: "https://github.com/DroidKaigi/conference-app-2024/issues/954"
      -
        title: "copilot-instructions.md の整備"
        body:
          text: "copilot-instructions.mdのベストプラクティクスに沿って内容が自動で修正されるClaudeのスキルを作成した。上記のSkillを使用しGitHub Copilotへの指示を整理・追加し、PRレビュー時のサジェスト品質を改善した。Copilotを使用しての修正とせずClaude Codeのスキルとしたのは、コンテキストスイッチの防止観点とCopilotで実際に修正を行った上でのUX検討より。"
          links:
            -
              label: "copilot-instructions.mdのベストプラクティクス"
              url: "https://github.blog/ai-and-ml/unlocking-the-full-power-of-copilot-code-review-master-your-instructions-files/"
      -
        title: "oss-licenses-plugin -> AboutLibraries移行"
        body:
          text: "AboutLibrariesへ移行することでoss-licenses-pluginが抱えている問題を解決。AboutLibrariesはDroidKaigiでも使用されており実績があり、EdgeToEdge対応もスムーズに行えることから選定。"
          links:
            -
              label: "AboutLibraries"
              url: "https://github.com/mikepenz/AboutLibraries"
      -
        title: "SwiftExportの導入検討検証"
        body:
          text: "技術調査からプロダクトへの導入可否の判定までを実施。現段階ではalpha版であり、suspend関数がサポートされていないなど基本的な機能がそろっていないことから導入は見送るという結論をレポートしチームへ貢献。"
      -
        title: "Devinを運用可能とし実際にPRを並行で作成させどのように使えるかをチームに示す"
        body:
          text: "DevinマシンのセットアップとDevinに対応させるのに相応しい内容のIssueを用意し、可能な限り並行で作業させ性能限界を調査。一度に20件のIssueを対応させPRの作成からマージまでを完遂できることを確認。Devinはインターン・ジュニアエンジニアレベルの作業を夜間に任せるのに適しているため、Claudeを使用してDevinが滞りなく作業可能な内容までブレークダウンしたIssueを作成。その際にClaudeからDevin用のタスク用文章を作成するための種々のClaudeのスキルも作成し対応。Devinが提供しているMCPではClaude経由でDevinへ直接指示を与えたりセッション状況の確認ができないので、Devinが提供しているREST APIをClaudeにスキル化させ、スキルを使用することでClaudeと連携し作業可能とする対応も実施。種々のスキルはチームへPRとして公開し、本格導入が決まった際にはそれを基にチームで使用可能にできるよう知見を共有。"
          links:
            -
              label: "Devin guidelines"
              url: "https://docs.devin.ai/ja/essential-guidelines/when-to-use-devin"
            -
              label: "Devin MCP"
              url: "https://docs.devin.ai/ja/work-with-devin/devin-mcp"
            -
              label: "Devin REST API"
              url: "https://docs.devin.ai/ja/api-reference/overview"
      -
        title: "開発補助ツールの作成"
        body:
          text: "Claude A/B連携スキル: claude -p オプションを使用し、要約・指示担当と重い処理担当を分離するワークフローを構築した。"
          links:
            -
              label: "claude -p オプション"
              url: "https://code.claude.com/docs/ja/cli-reference"
      -
        title: "HostService → UseCase移行, RxJava -> Coroutine移行"
        body:
          text: "複数モジュールのHostServiceをUseCase層へ置き換えた。同様にRxJavaからCoroutineへ段階的に移行した。"
          links:
            -
              label: "段階的に移行"
              url: "https://kotlinlang.org/api/kotlinx.coroutines/kotlinx-coroutines-rx2/"
      -
        title: "ADR策定と命名規則の統一"
        body:
          text: "UseCaseの命名規則ADRを策定し、17件のUseCaseをADR準拠にリネームした。XXXServiceListener → OnXxxLoadedListener への命名統一を実施した。interface を fun interface に統一する方針をADRとして明文化した。ADRの作成 -> Claudeでスキル化 -> スキルでADRを参照するのでスキルさえ発動すればADRに準拠したコードが自動的に生成される という仕組みにすることでADRの形がい化を防止。"
    ingenuity:
      -
        text: "Claudeの活用によって得られた知見をSkill等の形にしてチームへ即座に還元。"
      -
        text: "追加より削除を重視し、技術的負債の返済を意識した。"
      -
        text: "ルールではなく、CI/CDやCopilotレビューなどの仕組みを組み合わせ同じミスをチーム全員が繰り返さないようにする。"
      -
        text: "ADRで設計判断を明文化し、暗黙知の形式知化を進めた。"
      -
        text: "将来の保守者が「なぜその設計か」を追えるようにした。"
  -
    id: "newmo"
    employmentType: "contract"
    period: "2025.04 - 2025.06"
    duration: "3ヶ月"
    bizType: "BtoC & BtoB"
    companyName: "newmo株式会社"
    projectName: "newmoタクシー車載タブレットアプリ&乗客用スマートフォンアプリ開発・保守"
    role: "乗客用アプリ・乗務員用アプリ両方の機能追加・保守"
    team: "10人以上"
    collaboration: "Android/iOS/Web/BE"
    techStack:
      - "Kotlin"
      - "Jetpack Compose"
      - "Android"
      - "GraphQL(Federation)"
      - "Kotlin Coroutine"
      - "Figma"
      - "GoogleMapsAPI"
      - "Datadog"
      - "Devin"
      - "Linear"
      - "Slack"
      - "MagicPod"
    overview:
      -
        text: "乗客が使用するアプリのストアはこちら"
        links:
          -
            label: "乗客用アプリストア"
            url: "https://apps.apple.com/us/app/newmo-%E3%83%8B%E3%83%A5%E3%83%BC%E3%83%A2-%E3%82%BF%E3%82%AF%E3%82%B7%E3%83%BC-%E3%83%A9%E3%82%A4%E3%83%89%E3%82%B7%E3%82%A7%E3%82%A2%E3%82%A2%E3%83%97%E3%83%AA/id6738711799?mt=8"
      -
        text: "タクシーの乗務員が使用するタブレットのアプリはストアを使用して公開していない。"
      -
        text: "モノリポジトリのため、Android/iOS/Web/BE全てが単一のリポジトリにて開発されている。"
      -
        text: "通信はGraphQLに統一されている。BFFパターンではなくFederationパターンが採用されている。そのため、サブグラフとスーパーグラフが存在する。"
        links:
          -
            label: "Federationパターン"
            url: "https://graphql.org/learn/federation/"
      -
        text: "乗客・乗務員両方のアプリはGoogleMap部分などComposeに対応していない部分以外はComposeで画面が構成されている。"
    responsibility:
      -
        text: "乗客用アプリ・乗務員用アプリ両方の機能追加・保守を担当。"
      -
        text: "チーム人数は10人以上(担当が固定されていないので、人数は変動)。"
      -
        text: "リリースは一週間ごとに行われ、当番制で行うため自分も担当。"
      -
        text: "後半は乗務員用アプリの施策対応やMagicPodを使ったテストケースの追加がメイン。"
    challenges:
      -
        text: "乗客用アプリはiOS側より開発が遅れていたので、iOSのリリース完了後にAndroidを普段開発していない人もオンボーディングを受けた上でコードを書いている。そのため、Androidの経験の浅いメンバーによって書かれた部分の書き方が推奨の構成と異なる状態となっている。ローディング表示なども入っていないため、ロード中に「さん」など固定文字だけが一瞬見えるような状態となっている。"
      -
        text: "リリースプロセスの資料があるものの、暗黙知になっている部分が多く、資料を見るだけでは完結しない状態となっている。そのためか、特定の同じ人がずっとリリース作業を担当しており、その人が休めない状態となっていた。"
      -
        text: "乗務員用アプリの施策対応によって、一部効果音を端末の音量設定を0に設定していても必ず鳴るようにした。音が鳴って欲しくない場面(オフィスでの開発時やQA時)でも音が鳴るようになってしまった。"
      -
        text: "プロダクトの方針が大きく変わったことで、乗客用アプリの優先度が下がったためアプリのQAコストを削減し、乗務員用アプリへリソースを再配分する必要がある。"
    approach:
      -
        title: "乗務員用アプリの構成に合わせたリファクタ"
        body:
          text: "乗務員用アプリはAndroidの経験が豊富なメンバーによって記述されているため、そちらで使用されているUiStateBuilderを用いてリファクタを行った。"
          links:
            -
              label: "UiStateBuilder"
              url: "https://github.com/DroidKaigi/conference-app-2023/blob/f255ed2f6f07f9f6f83bc3b15384b9bcf001d8e8/core/ui/src/commonMain/kotlin/io/github/droidkaigi/confsched2023/ui/UiStateBuilder.kt"
      -
        title: "ローディング表示の導入"
        body:
          text: "リファクタと同時にShimmerEffectを導入することで、ローディング表示を導入し固定文字がチラつく状態を解消した。"
          links:
            -
              label: "ShimmerEffect"
              url: "https://github.com/valentinilk/compose-shimmer"
      -
        title: "リリースプロセス整備"
        body:
          text: "乗務員用アプリ・乗客用アプリのリリースプロセスの資料を実際にリリース作業を行なって出た不明点をもとに書き直し、リリース作業をしたことが無い人でも資料を見れば必要な手順が分かるようにすることで、単一障害点とならないようにした。SlackのWorkflow Builderを使用してリリース作業に役立つワークフローを追加した。"
      -
        title: "効果音のデバッグ設定"
        body:
          text: "デバッグ設定を利用して、効果音が端末の設定音量に応じて鳴る機能を追加した。DroidKaigi2024にてCompositionLocalProviderを使用していたので、この機能もCompositionLocalProviderを使用してUiStateを介さずに実現した。"
          links:
            -
              label: "DroidKaigi2024"
              url: "https://github.com/DroidKaigi/conference-app-2024/pull/880"
      -
        title: "MagicPodによるリグレッションテスト自動化"
        body:
          text: "MagicPodを用いてリグレッションテストの自動化に着手した。"
    ingenuity:
      -
        text: "DroidKaigiの知見を活用した。"
  -
    id: "dwango"
    employmentType: "contract"
    period: "2024.10 - 2025.03"
    duration: "6ヶ月"
    bizType: "BtoC"
    companyName: "株式会社ドワンゴ（KADOKAWAグループ）"
    projectName: "Zen Studyアプリ開発・保守"
    role: "R高対応を中心としたAndroidアプリ改修・技術調査・保守"
    techStack:
      - "Kotlin"
      - "Jetpack Compose"
      - "Android"
      - "RESTAPI"
      - "Kotlin Coroutine"
      - "RxJava"
      - "Robolectric"
      - "firebase"
      - "OAuth2.0"
      - "OIDC"
    overview:
      -
        text: "ストアはこちら"
        links:
          -
            label: "ストア"
            url: "https://play.google.com/store/apps/details?id=nico.ed.nnn.zane"
      -
        text: "マルチモジュールだがDIは入っていない。"
      -
        text: "PresenterとInjectorと呼ばれるクラスによってDIが行われている。"
      -
        text: "DIは入っていないがRoborazziは入っている"
        links:
          -
            label: "Roborazzi記事"
            url: "https://qiita.com/hiesiea/items/237524b68d70ea1fecb6"
      -
        text: "WebViewとNativeの混合構成。"
    responsibility:
      -
        text: "R高が開学するためそちらに対応するためのアプリの改修と技術調査を主に担当。"
        links:
          -
            label: "R高"
            url: "https://nnn.ed.jp/high_school_feature/r_high_school/"
      -
        text: "他にもCrashlyticsで挙がってくるバグの調査・対応も担当。"
    challenges:
      -
        text: "ログイン導線が変更になるためそれに対応するためにOAuth 2.0 / OIDCに準拠したログインフローを実装する必要がある。"
        links:
          -
            label: "OAuth 2.0"
            url: "https://datatracker.ietf.org/doc/html/rfc6749"
          -
            label: "OIDC"
            url: "https://openid.net/developers/how-connect-works/"
      -
        text: "ただし標準的なOIDCのフローやPKCE対応とは異なる実装を求められるため公式ドキュメントで使用が推奨されているAppAuthを使用しない独自実装が必要。"
        links:
          -
            label: "PKCE"
            url: "https://datatracker.ietf.org/doc/html/rfc7636"
          -
            label: "公式ドキュメント"
            url: "https://developers.google.com/identity/protocols/oauth2/native-app?hl=ja"
          -
            label: "AppAuth"
            url: "https://github.com/openid/AppAuth-Android"
      -
        text: "AndroidチームにOAuth2.0 / OIDCに知見の有るメンバーが1人も居ないため自分で調べて実装・懸念点の洗い出しを行う必要がある。"
      -
        text: "レビュー前までに他のメンバーにも知識を付けてもらうための勉強会等をレビューまでに定期的に行う必要がある。レビュー時に他のメンバーにもOAuth2.0 / OIDCの知見が無いとレビューが出来ずタスクが進行できないので理解してもらう事は必須。"
    approach:
      -
        title: "OAuth2.0 / OIDC / PKCE の継続調査と実装"
        body:
          text: "実装フェーズが複数有るのでそれらに取り組みつつOAuth2.0 / OIDCやPKCEについての知識を深める。"
      -
