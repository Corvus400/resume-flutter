name: Deploy Flutter Web to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  REPO_NAME: ${{ github.event.repository.name }}
  RESUME_SOURCE_README: ${{ github.workspace }}/resume-source/README.md

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: Corvus400/resume
          ref: master
          path: resume-source

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          enablement: true

      - name: Install Flutter
        run: |
          set -e
          git clone --depth 1 --branch 3.41.5 https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/flutter/bin/flutter" --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated resume content
        run: dart run tool/generate_resume_content.dart --check

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --exclude-tags golden

      - name: Build
        run: |
          set -e
          flutter build web --wasm --release --base-href "/${REPO_NAME}/"
          touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
