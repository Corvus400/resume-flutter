name: Deploy Flutter Web to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  REPO_NAME: ${{ github.event.repository.name }}
  RESUME_SOURCE_README: ${{ github.workspace }}/resume-source/README.md

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: Corvus400/resume
          ref: master
          path: resume-source

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated resume content
        run: dart run tool/generate_resume_content.dart --check

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --exclude-tags golden

      - name: Build
        run: |
          set -e
          flutter build web --wasm --release --base-href "/${REPO_NAME}/"
          touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
