<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="とだやま.ℝ(Todayama_R) の Flutter Web ポートフォリオ。AI時代のモバイル開発を、設計力と検証力で加速するエンジニアの職務経歴を構造化して表示します。">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Resume Flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>とだやま.ℝ | Resume Flutter</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f5f1eb;
      color: #171412;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
    }

    .loading-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .loading-card {
      width: min(100%, 720px);
      border: 1px solid #ded5c8;
      border-radius: 12px;
      padding: 32px;
      background: #fbf8f2;
    }

    .loading-kicker {
      margin: 0 0 16px;
      color: #8a8176;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .loading-title {
      margin: 0;
      font-size: clamp(32px, 8vw, 72px);
      line-height: 1.08;
      font-weight: 800;
    }

    .loading-role {
      margin: 18px 0 0;
      color: #5f574f;
      font-size: 14px;
      font-weight: 600;
    }

    .loading-bar {
      margin-top: 28px;
      height: 3px;
      overflow: hidden;
      border-radius: 999px;
      background: #e8dfd2;
    }

    .loading-bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: #9f4014;
      animation: loading-slide 1.1s ease-in-out infinite alternate;
    }

    @keyframes loading-slide {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(140%);
      }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-shell" aria-label="Flutter app loading">
    <main class="loading-card">
      <p class="loading-kicker">Resume · Flutter Web</p>
      <h1 class="loading-title">とだやま.ℝ<br>Todayama_R</h1>
      <p class="loading-role">Android / Flutter ソフトウェアエンジニア</p>
      <div class="loading-bar" aria-hidden="true"></div>
    </main>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.remove();
      }
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
